<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Learning Input Types</h1>

    <div class="input-grid">

        <div class="input-card">
            <label for="inp-text">Name</label>
            <input type="text" id="inp-text" placeholder="Enter your name">
        </div>

        <div class="input-card">
            <label for="inp-password">Password</label>
            <input type="password" id="inp-password" placeholder="Enter your password">
        </div>

        <div class="input-card">
            <label for="inp-email">Email</label>
            <input type="email" id="inp-email" placeholder="Enter your email">
        </div>

        <div class="input-card">
            <label for="inp-number">Number</label>
            <input type="number" id="inp-number" placeholder="Enter a number">
        </div>

        <div class="input-card">
            <label for="inp-date">Date</label>
            <input type="date" id="inp-date">
        </div>

        <div class="input-card">
            <label for="inp-time">Time</label>
            <input type="time" id="inp-time">
        </div>

        <div class="input-card">
            <label for="inp-datetime">Date &amp; Time</label>
            <input type="datetime-local" id="inp-datetime">
        </div>

        <div class="input-card">
            <label for="inp-month">Month</label>
            <input type="month" id="inp-month">
        </div>

        <div class="input-card">
            <label for="inp-week">Week</label>
            <input type="week" id="inp-week">
        </div>

        <div class="input-card">
            <label for="inp-url">URL</label>
            <input type="url" id="inp-url" placeholder="https://example.com">
        </div>

        <div class="input-card">
            <label for="inp-search">Search</label>
            <input type="search" id="inp-search" placeholder="Search...">
        </div>

        <div class="input-card">
            <label for="inp-tel">Phone</label>
            <input type="tel" id="inp-tel" placeholder="+1 234 567 8900">
        </div>

        <div class="input-card">
            <label for="inp-color">Color</label>
            <input type="color" id="inp-color" value="#4a90e2">
        </div>

        <div class="input-card">
            <label for="inp-range">Range</label>
            <input type="range" id="inp-range" min="0" max="100" value="50">
        </div>

        <div class="input-card">
            <label for="inp-file">File</label>
            <input type="file" id="inp-file">
        </div>

        <div class="input-card">
            <label for="inp-checkbox">Checkbox</label>
            <input type="checkbox" id="inp-checkbox">
        </div>

        <div class="input-card">
            <label>Radio</label>
            <input type="radio" name="choice" id="radio-yes"> Yes
            <input type="radio" name="choice" id="radio-no"> No
        </div>

        <div class="input-card">
            <input type="submit" value="Submit">
        </div>

        <div class="input-card">
            <input type="reset" value="Reset">
        </div>

        <div class="input-card">
            <input type="button" value="Click Me">
        </div>

    </div>

</body>

</html>
