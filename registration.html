<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registration</title>
    <link rel="stylesheet" href="registration.css">
  </head>
  <body>
    <h1>Student Registration form</h1>

    <form class="reg-form fade-in" action="welcome.html" method="get">
      <label for="email">Email:</label><br />
      <input type="email" id="email" name="email" required><br /><br />

      <label for="password">Password:</label><br />
      <input type="password" id="password" name="password" required><br /><br />

      <label for="address">Address:</label><br />
      <textarea id="address" name="address" rows="3" required></textarea><br /><br />

      <label for="contact">Contact details (phone):</label><br />
      <input type="tel" id="contact" name="contact" required><br /><br />

      <fieldset>
        <legend>Gender</legend>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
      </fieldset>

      <br />
      <fieldset>
        <legend>Hobbies</legend>
        <input type="checkbox" id="hobby1" name="hobbies" value="Reading">
        <label for="hobby1">Reading</label>
        <input type="checkbox" id="hobby2" name="hobbies" value="Sports">
        <label for="hobby2">Sports</label>
        <input type="checkbox" id="hobby3" name="hobbies" value="Music">
        <label for="hobby3">Music</label>
        <input type="checkbox" id="hobby4" name="hobbies" value="Other">
        <label for="hobby4">Other</label>
      </fieldset>

      <br />
      <fieldset>
        <legend>Skills</legend>
        <div class="inline">
          <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
          <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
          <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
          <label><input type="checkbox" name="skills" value="Python"> Python</label>
          <label><input type="checkbox" name="skills" value="Databases"> Databases</label>
        </div>
      </fieldset>

      <br />
      <label for="course">Select course</label><br />
      <select id="course" name="course" required>
        <option value="">-- choose --</option>
        <option value="BBA">BBA</option>
        <option value="BSE">BSE</option>
        <option value="BSCS">BSCS</option>
      </select>

      <br /><br />
      <input type="submit" value="Submit">
      <input type="reset" value="Reset">
    </form>
  </body>
</html>
